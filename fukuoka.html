<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#0f766e">
<title>후쿠오카 6.15–18</title>
<style>
  :root{
    --bg:#f5f3ee; --card:#ffffff; --ink:#1d2530; --muted:#6b7480; --line:#e7e3da;
    --accent:#0f766e;
    --transport:#2563eb; --lodging:#9a6a3a; --food:#ea580c;
    --shopping:#9333ea; --sights:#16a34a; --cafe:#d4960a;
    --warn:#dc2626; --warnbg:#fef2f2;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0}
  body{
    background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
    font-size:15px; line-height:1.45; padding-bottom:40px;
  }
  .num{font-variant-numeric:tabular-nums}
  /* header */
  header{
    position:sticky; top:0; z-index:30; background:var(--accent); color:#fff;
    padding:calc(env(safe-area-inset-top) + 10px) 14px 0;
  }
  .htop{display:flex; align-items:center; justify-content:space-between}
  .htop h1{font-size:17px; font-weight:800; margin:0; letter-spacing:-.2px}
  .htop h1 small{font-weight:600; opacity:.8; font-size:13px; margin-left:6px}
  .mymap{color:#fff; text-decoration:none; font-size:13px; font-weight:700; background:rgba(255,255,255,.18); padding:6px 10px; border-radius:999px}
  .tabs{display:flex; gap:4px; margin-top:10px}
  .tabs button{flex:1; border:0; background:transparent; color:rgba(255,255,255,.7); font-weight:800; font-size:14px; padding:10px 0; border-radius:10px 10px 0 0; cursor:pointer}
  .tabs button.on{background:var(--bg); color:var(--ink)}
  /* generic */
  .wrap{padding:12px}
  .card{background:var(--card); border:1px solid var(--line); border-radius:14px}
  .sec-title{font-size:12px; font-weight:800; letter-spacing:.4px; color:var(--muted); text-transform:uppercase; margin:18px 2px 8px}
  button.btn{border:1px solid var(--line); background:#fff; border-radius:10px; padding:8px 12px; font-weight:700; font-size:13px; cursor:pointer; color:var(--ink)}
  button.btn.solid{background:var(--accent); color:#fff; border-color:var(--accent)}
  input,select,textarea{font-family:inherit; font-size:15px}
  input[type=text],input[type=number],select,textarea{
    border:1px solid var(--line); border-radius:10px; padding:9px 10px; background:#fff; color:var(--ink); width:100%}
  /* alerts */
  #alertsBox{margin-bottom:6px}
  .alert{display:flex; gap:8px; align-items:flex-start; background:var(--warnbg); border:1px solid #fbcaca; border-left:4px solid var(--warn); border-radius:10px; padding:9px 11px; margin-bottom:7px}
  .alert .txt{flex:1; font-size:13.5px; font-weight:600; color:#7f1d1d}
  .alert .x{color:#b91c1c; font-weight:800; cursor:pointer; padding:0 4px; background:none; border:0; font-size:15px}
  .alert .txt[contenteditable]{outline:none}
  .addalert{display:flex; gap:6px; margin-top:2px}
  /* day subtabs */
  .daytabs{display:flex; gap:6px; overflow-x:auto; padding:4px 0 10px; -webkit-overflow-scrolling:touch}
  .daytabs button{flex:0 0 auto; border:1px solid var(--line); background:#fff; border-radius:999px; padding:8px 13px; font-weight:800; font-size:13px; cursor:pointer; color:var(--muted)}
  .daytabs button.on{background:var(--ink); color:#fff; border-color:var(--ink)}
  .daytabs button span{font-weight:600; opacity:.75; font-size:11px; margin-left:4px}
  /* timeline */
  .day-head{font-size:18px; font-weight:900; letter-spacing:-.3px; margin:8px 2px 16px; color:var(--ink)}
  .day-head span{font-weight:700; color:var(--muted); font-size:13px; margin-left:7px}
  .item{position:relative; margin:0 0 16px; padding-left:19px}
  .item:before{content:""; position:absolute; left:5px; top:9px; bottom:-16px; width:2px; background:var(--line)}
  .item:last-child:before{display:none}
  .dot{position:absolute; left:0; top:7px; width:12px; height:12px; border-radius:50%; box-shadow:0 0 0 3px var(--bg)}
  .ic{display:flex; align-items:center; gap:9px; margin-bottom:8px}
  .time{font-weight:800; font-size:12.5px; color:#fff; background:var(--c,#999); padding:3px 9px; border-radius:7px; min-width:48px; text-align:center}
  .ititle{font-weight:800; font-size:15px; flex:1; line-height:1.25; letter-spacing:-.2px}
  .badge-fix{font-size:10px; font-weight:800; color:var(--c); border:1px solid var(--c); padding:1px 6px; border-radius:6px; letter-spacing:.3px; white-space:nowrap}
  .del-item{background:none; border:0; color:#c0392b; font-weight:800; cursor:pointer; font-size:16px; padding:2px 4px; line-height:1}
  .places{display:flex; flex-direction:column; gap:8px}
  .place{display:flex; align-items:center; gap:10px; padding:12px 13px; border:1px solid var(--line); border-radius:12px; background:#fff}
  .place.fix{background:color-mix(in srgb, var(--c) 7%, #fff); border-color:color-mix(in srgb, var(--c) 24%, var(--line))}
  .circle{flex:0 0 auto; width:26px; height:26px; border-radius:50%; border:2px solid #cfcabf; background:#fff; color:transparent; font-weight:900; cursor:pointer; font-size:14px; display:flex; align-items:center; justify-content:center; padding:0}
  .place.done .circle{background:var(--sights); border-color:var(--sights); color:#fff}
  .pname{flex:1; font-weight:700; font-size:14.5px; line-height:1.3}
  .place.done .pname{color:var(--muted); text-decoration:line-through}
  .map-btn{flex:0 0 auto; text-decoration:none; background:#eaf1ff; color:#2563eb; font-weight:800; font-size:14px; padding:8px 11px; border-radius:9px}
  .mini{flex:0 0 auto; background:none; border:0; color:#9aa0a8; cursor:pointer; font-size:15px; padding:5px 4px; line-height:1}
  .mini.del{color:#c0392b}
  /* purchase accordion */
  .acc{width:100%; text-align:left; background:#f3efe6; border:1px solid var(--line); border-radius:11px; padding:10px 13px; font-weight:800; font-size:13px; color:var(--ink); cursor:pointer; display:flex; align-items:center; gap:8px}
  .acc .cnt{background:var(--shopping); color:#fff; border-radius:999px; font-size:11px; padding:1px 8px; font-weight:800}
  .acc .chev{margin-left:auto; color:var(--muted); font-size:12px}
  .plist{padding:12px 13px; background:#faf8f3; border:1px solid var(--line); border-top:0; border-radius:0 0 11px 11px; margin-top:-1px}
  .pitem{display:flex; align-items:center; gap:10px; margin-bottom:9px}
  .pitem input.pi-name{flex:1; border:0; background:transparent; padding:5px 0; font-weight:700; font-size:14px}
  .pitem input.pi-price{width:86px; text-align:right; padding:8px 9px}
  .pitem .pi-chk{width:24px; height:24px; flex:0 0 auto}
  .pitem.bought input.pi-name{color:var(--muted); text-decoration:line-through}
  .pi-meta{display:flex; gap:7px; margin:0 0 11px 34px}
  .seg{display:inline-flex; border:1px solid var(--line); border-radius:8px; overflow:hidden}
  .seg button{border:0; background:#fff; padding:6px 12px; font-size:12px; font-weight:800; cursor:pointer; color:var(--muted)}
  .seg button.on{background:var(--ink); color:#fff}
  .pi-del{color:#b91c1c; background:none; border:0; font-weight:800; cursor:pointer; padding:4px}
  .addrow{display:flex; gap:7px; margin-top:6px}
  /* money */
  .money-card{padding:13px; margin-bottom:12px}
  .rate-row{display:flex; align-items:center; gap:8px; flex-wrap:wrap}
  .rate-row b{font-weight:800}
  .conv{display:flex; align-items:center; gap:8px; margin-top:10px}
  .conv input{flex:1}
  .conv .eq{color:var(--muted); font-weight:800}
  .total{font-size:30px; font-weight:900; letter-spacing:-.5px}
  .total small{font-size:15px; font-weight:700; color:var(--muted)}
  .krw{color:var(--accent); font-weight:800; margin-top:2px}
  .bd{display:flex; gap:8px; flex-wrap:wrap; margin-top:10px}
  .chip{background:#f1efe9; border-radius:999px; padding:5px 11px; font-size:12.5px; font-weight:700}
  .chip b{font-weight:900}
  .ex{display:flex; align-items:center; gap:8px; padding:9px 0; border-top:1px solid var(--line)}
  .ex .e-cat{font-size:11px; font-weight:800; color:#fff; padding:2px 7px; border-radius:6px}
  .ex .e-main{flex:1}
  .ex .e-main .e-memo{font-weight:700; font-size:13.5px}
  .ex .e-main .e-sub{font-size:11.5px; color:var(--muted)}
  .ex .e-amt{font-weight:800; font-variant-numeric:tabular-nums}
  .ex .e-x{color:#b91c1c; background:none; border:0; font-weight:800; cursor:pointer; font-size:15px}
  .addex .r{display:flex; gap:8px; margin-bottom:8px}
  .addex .r > *{flex:1}
  .pickrow{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:8px}
  .pick{border:1px solid var(--line); background:#fff; border-radius:999px; padding:6px 12px; font-weight:700; font-size:13px; cursor:pointer; color:var(--muted)}
  .pick.on{background:var(--accent); color:#fff; border-color:var(--accent)}
  .hint{font-size:12px; color:var(--muted); margin:6px 2px}
  .empty{color:var(--muted); font-size:13px; text-align:center; padding:14px}
  /* category colour helpers */
  .c-transport{--c:var(--transport)} .c-lodging{--c:var(--lodging)} .c-food{--c:var(--food)}
  .c-shopping{--c:var(--shopping)} .c-sights{--c:var(--sights)} .c-cafe{--c:var(--cafe)}
  .dot{background:var(--c,#999)} .e-cat{background:var(--c,#999)}
</style>
</head>
<body>
<header>
  <div class="htop">
    <h1>후쿠오카 <small>6.15–18</small></h1>
    <a class="mymap" id="mymap" href="https://www.google.com/maps/d/viewer?mid=19CPW2iyssLfpVSDNefUO7TPHxp9hnLo" target="_blank" rel="noopener">🗺 마이맵</a>
  </div>
  <div class="tabs">
    <button id="tab-plan" class="on" onclick="switchTab('plan')">일정</button>
    <button id="tab-money" onclick="switchTab('money')">돈</button>
  </div>
</header>

<div id="errbar" style="display:none; background:#7f1d1d; color:#fff; font-size:12.5px; font-weight:700; padding:8px 12px; line-height:1.4"></div>

<!-- PLAN VIEW -->
<div id="view-plan" class="wrap">
  <div id="alertsBox">
    <div class="sec-title" style="margin-top:4px">핵심 알림 · 직접 수정</div>
    <div id="alertsList"></div>
    <div class="addalert">
      <input type="text" id="newAlert" placeholder="알림 추가…">
      <button class="btn solid" onclick="addAlert()">추가</button>
    </div>
  </div>

  <div class="daytabs" id="dayTabs"></div>
  <div id="timeline"></div>
</div>

<!-- MONEY VIEW -->
<div id="view-money" class="wrap" style="display:none">
  <div class="card money-card">
    <div class="rate-row">
      <b>환율</b> 100엔 =
      <input type="number" id="rateInput" class="num" style="width:90px" inputmode="numeric"> 원
      <button class="btn" onclick="saveRate()">적용</button>
    </div>
    <div class="conv">
      <input type="number" id="convYen" class="num" inputmode="numeric" placeholder="엔(¥)" oninput="convFrom('yen')">
      <span class="eq">↔</span>
      <input type="number" id="convWon" class="num" inputmode="numeric" placeholder="원(₩)" oninput="convFrom('won')">
    </div>
    <div class="hint">쇼핑하다 "이거 얼마지?" 할 때 바로 계산</div>
  </div>

  <div class="card money-card">
    <div class="total num">¥<span id="totalYen">0</span></div>
    <div class="krw num">≈ ₩<span id="totalWon">0</span></div>
    <div class="bd" id="breakdown"></div>
  </div>

  <div class="sec-title">지출 추가</div>
  <div class="card money-card addex">
    <div class="r">
      <input type="number" id="exAmt" class="num" inputmode="numeric" placeholder="금액 ¥">
      <input type="text" id="exMemo" placeholder="메모(선택)">
    </div>
    <div class="pickrow" id="exCat" data-pick="cat">
      <button class="pick on" data-v="식비">식비</button>
      <button class="pick" data-v="쇼핑">쇼핑</button>
      <button class="pick" data-v="교통">교통</button>
      <button class="pick" data-v="관광">관광</button>
      <button class="pick" data-v="기타">기타</button>
    </div>
    <div class="pickrow" id="exPayer" data-pick="payer">
      <button class="pick on" data-v="나">나</button>
      <button class="pick" data-v="여친">여친</button>
    </div>
    <div class="pickrow" id="exMethod" data-pick="method">
      <button class="pick on" data-v="현금">현금</button>
      <button class="pick" data-v="카드">카드</button>
    </div>
    <button class="btn solid" style="width:100%" onclick="addExpense()">지출 추가</button>
  </div>

  <div class="sec-title">전체 내역</div>
  <div class="card money-card"><div id="expenseList"></div></div>
</div>

function showErr(msg){
  var b=document.getElementById('errbar');
  if(b){ b.style.display='block'; b.textContent='⚠ '+msg; }
}
window.addEventListener('error', function(e){
  showErr((e.message||'스크립트 오류')+(e.lineno?(' (줄 '+e.lineno+')'):''));
});
window.addEventListener('unhandledrejection', function(e){
  showErr('비동기 오류: '+((e.reason&&e.reason.message)||e.reason||''));
});

/* ---------- 저장소: Firebase 있으면 연동, 없으면 폰 로컬 ---------- */
let DB, state = {}, FB_MODE=false;
const FB_OK = firebaseConfig.apiKey && firebaseConfig.apiKey.indexOf('여기에') === -1;
if (FB_OK && typeof firebase !== 'undefined') {
  try {
    firebase.initializeApp(firebaseConfig);
    const root = firebase.database().ref('fukuoka');
    DB = {
      sub(cb){ root.on('value', s => cb(s.val()||{}), err => showErr('동기화 오류: '+err.message)); },
      set(p,v){ root.child(p).set(v); },
      push(p,v){ return root.child(p).push(v).key; },
      rm(p){ root.child(p).remove(); }
    };
    FB_MODE=true;
  } catch(e){ console.error(e); showErr('Firebase 연결 실패 → 로컬 모드. '+(e&&e.message||e)); }
}
if (!DB) {
  const KEY='fukuoka_trip_local';
  let data = JSON.parse(localStorage.getItem(KEY)||'{}'); let subs=[];
  const setIn=(o,p,v)=>{const k=p.split('/'); let c=o; for(let i=0;i<k.length-1;i++){c[k[i]]=c[k[i]]||{}; c=c[k[i]];} if(v===null) delete c[k[k.length-1]]; else c[k[k.length-1]]=v;};
  const save=()=>{localStorage.setItem(KEY,JSON.stringify(data)); subs.forEach(cb=>cb(data));};
  DB = {
    sub(cb){ subs.push(cb); cb(data); },
    set(p,v){ setIn(data,p,v); save(); },
    push(p,v){ const id='k'+Date.now().toString(36)+Math.random().toString(36).slice(2,6); setIn(data,p+'/'+id,v); save(); return id; },
    rm(p){ setIn(data,p,null); save(); }
  };
}

const $=s=>document.querySelector(s);
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const mapUrl=q=>'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(q);
function rate(){ return Number(state.rate)||920; }
function won(yen){ return Math.round((Number(yen)||0)*rate()/100); }
function comma(n){ return (Number(n)||0).toLocaleString('ko-KR'); }
function pid(di,ii,pi){ return DAYS[di].id+'_'+ii+'_'+pi; }

function renderTimeline(){

  const done = state.done||{}, links = state.links||{}, hidden = state.hidden||{};
  let html = `<div class="day-head">${d.date}<span>${d.sub}</span></div>`;

        ${it.fix?`<span class="badge-fix">${CAT[it.cat]}</span>`:''}</div>
      <div class="places">`;
    it.places.forEach((pl,pi)=>{
      const id=pid(di,ii,pi);
      if(hidden[id]) return;
      const q = (links[id]&&links[id].q) || pl.q;

      const isDone = !!done[id];
      const eN = esc(nm).replace(/'/g,"\\'"), eQ = esc(q).replace(/'/g,"\\'");

    html += `<div class="item ${c}"><div class="dot"></div>
      <div class="ic"><span class="time num">${esc(cp.t||'—')}</span><span class="ititle">${esc(cp.title)}</span>

        <button class="mini" onclick="editLink('${id}','${et}','${esc(cp.q||cp.title).replace(/'/g,"\\'")}')">✎</button>
        <button class="mini del" onclick="delCustom('${d.id}','${k}','${et}')">✕</button>
      </div>${canBuy?accordion(id):''}</div></div>`;
  });

  html += `<div class="card" style="padding:12px; margin-top:12px">
    <div class="sec-title" style="margin:0 0 9px">+ 장소 직접 추가</div>
    <div class="addrow"><input type="text" id="cpName" placeholder="장소 이름"><input type="text" id="cpTime" class="num" style="max-width:74px" placeholder="시간"></div>
    <div class="pickrow" id="cpCat" data-pick="cpcat" style="margin-top:9px">
      <button class="pick on" data-v="food">식사</button><button class="pick" data-v="shopping">쇼핑</button>
      <button class="pick" data-v="sights">관광</button><button class="pick" data-v="cafe">카페</button>
      <button class="pick" data-v="transport">이동</button>
    </div>
    <button class="btn solid" style="width:100%; margin-top:9px" onclick="addCustom()">추가</button>
  </div>`;
  $('#timeline').innerHTML = html;

function accordion(id){
  const n=Object.keys((state.purchases&&state.purchases[id])||{}).length;
  const open=openPur.has(id);
  let h = `<button class="acc" onclick="togglePur('${id}')">🛒 구매목록${n?` <span class="cnt">${n}</span>`:''}<span class="chev">${open?'▾ 닫기':'▸ 열기'}</span></button>`;
  if(open) h += renderPurchase(id);
  return h;
}
function renderPurchase(placeId){
  const pur = (state.purchases&&state.purchases[placeId])||{};
  const keys=Object.keys(pur);
  let h = `<div class="plist">`;
  keys.forEach(k=>{
    const it=pur[k];
    h += `<div class="pitem ${it.bought?'bought':''}">
      <input type="checkbox" class="pi-chk" ${it.bought?'checked':''} onchange="setPur('${placeId}','${k}','bought',this.checked)">
      <input type="text" class="pi-name" value="${esc(it.name)}" onblur="setPur('${placeId}','${k}','name',this.value)">
      <input type="number" class="pi-price num" inputmode="numeric" placeholder="¥" value="${it.price!=null?it.price:''}" onblur="setPur('${placeId}','${k}','price',this.value)">
      <button class="pi-del" onclick="DB.rm('purchases/${placeId}/${k}')">✕</button>
    </div>`;
    if(it.bought){
      h += `<div class="pi-meta">
        <span class="seg">
          <button class="${(it.payer||'나')==='나'?'on':''}" onclick="setPur('${placeId}','${k}','payer','나')">나</button>
          <button class="${it.payer==='여친'?'on':''}" onclick="setPur('${placeId}','${k}','payer','여친')">여친</button>
        </span>
        <span class="seg">
          <button class="${(it.method||'카드')==='현금'?'on':''}" onclick="setPur('${placeId}','${k}','method','현금')">현금</button>
          <button class="${(it.method||'카드')==='카드'?'on':''}" onclick="setPur('${placeId}','${k}','method','카드')">카드</button>
        </span>
      </div>`;
    }
  });
  if(keys.length===0) h += `<div class="hint" style="margin:2px 0 8px">살 것을 추가하고 체크하면 가계부에 자동 반영돼</div>`;
  h += `<div class="addrow"><input type="text" placeholder="살 것 추가…" onkeydown="if(event.key==='Enter'){addPur('${placeId}',this.value);this.value=''}">
    <button class="btn" onclick="var i=this.previousElementSibling; addPur('${placeId}',i.value); i.value=''">+</button></div>`;
  h += `</div>`;
  return h;
}
function renderMoney(){
  if(document.activeElement!==$('#rateInput')) $('#rateInput').value = rate();
  // entries = manual + bought purchases
  const entries=[];
  const ex = state.expenses||{};
  Object.keys(ex).forEach(k=>{const e=ex[k]; entries.push({id:k,manual:1,amt:+e.amt||0,cat:e.cat||'기타',payer:e.payer||'나',method:e.method||'현금',memo:e.memo||''});});
  const pur = state.purchases||{};
  Object.keys(pur).forEach(pl=>{Object.keys(pur[pl]).forEach(k=>{const it=pur[pl][k];
    if(it.bought){ entries.push({manual:0, amt:+it.price||0, cat:catOfPlace(pl), payer:it.payer||'나', method:it.method||'카드', memo:it.name+' · '+placeLabel(pl)});}
  });});
  const tot = entries.reduce((s,e)=>s+e.amt,0);
  $('#totalYen').textContent = comma(tot);
  $('#totalWon').textContent = comma(won(tot));
  // breakdown
  const by=(f)=>entries.reduce((m,e)=>{m[e[f]]=(m[e[f]]||0)+e.amt;return m;},{});
  const cash=by('method'); const payer=by('payer');
  $('#breakdown').innerHTML =
    `<span class="chip">현금 <b class="num">¥${comma(cash['현금']||0)}</b></span>`+
    `<span class="chip">카드 <b class="num">¥${comma(cash['카드']||0)}</b></span>`+
    `<span class="chip">나 <b class="num">¥${comma(payer['나']||0)}</b></span>`+
    `<span class="chip">여친 <b class="num">¥${comma(payer['여친']||0)}</b></span>`;
  // list (newest first)
  entries.sort((a,b)=>(b.id||'').localeCompare(a.id||''));
  $('#expenseList').innerHTML = entries.length? entries.map(e=>`
    <div class="ex c-${CATPICK[e.cat]||'lodging'}">
      <span class="e-cat">${esc(e.cat)}</span>
      <div class="e-main"><div class="e-memo">${esc(e.memo||e.cat)}</div>
        <div class="e-sub">${e.payer} · ${e.method}${e.manual?'':' · 구매리스트'}</div></div>
      <span class="e-amt num">¥${comma(e.amt)}</span>
      ${e.manual?`<button class="e-x" onclick="DB.rm('expenses/${e.id}')">✕</button>`:''}
    </div>`).join('') : `<div class="empty">아직 지출 없음</div>`;
}
function catOfPlace(placeId){
  // placeId = dId_ii_pi  또는 cust_..
  if(placeId.startsWith('cust_')) return '기타';
  const [d,ii] = placeId.split('_'); const day=DAYS.find(x=>x.id===d); if(!day) return '기타';
  const it=day.items[+ii]; if(!it) return '기타';
  return ({food:'식비',shopping:'쇼핑',cafe:'식비',sights:'관광',transport:'교통',lodging:'기타'})[it.cat]||'기타';
}
function placeLabel(placeId){
  if(placeId.startsWith('cust_')) return '추가장소';
  const [d,ii,pi]=placeId.split('_'); const day=DAYS.find(x=>x.id===d); if(!day) return '';
  const it=day.items[+ii]; if(!it||!it.places[+pi]) return '';
  return it.places[+pi].n;
}

function switchTab(t){ activeTab=t;
  $('#view-plan').style.display = t==='plan'?'':'none';
  $('#view-money').style.display = t==='money'?'':'none';
  $('#tab-plan').classList.toggle('on',t==='plan');
  $('#tab-money').classList.toggle('on',t==='money');
  window.scrollTo(0,0);
}
function setDay(i){ activeDay=i; renderDayTabs(); renderTimeline(); }
function togglePur(id){ if(openPur.has(id)) openPur.delete(id); else openPur.add(id); renderTimeline(); }
function delPlace(id, name){
  if(!confirm('"'+name+'"\n이 장소를 목록에서 삭제할까?')) return;
  DB.set('hidden/'+id, true);
  DB.rm('purchases/'+id); DB.rm('done/'+id); DB.rm('links/'+id);
  openPur.delete(id);
}
function delCustom(dayId, k, title){
  if(!confirm('"'+title+'"\n이 추가 장소를 삭제할까?')) return;
  DB.rm('custom/'+dayId+'/'+k);
  DB.rm('purchases/cust_'+k); DB.rm('done/cust_'+k);
  openPur.delete('cust_'+k);
}
function addAlert(){ const v=$('#newAlert').value.trim(); if(!v)return; DB.push('alerts',v); $('#newAlert').value=''; }
function editAlert(k,v){ v=v.trim(); if(v) DB.set('alerts/'+k,v); else DB.rm('alerts/'+k); }
function toggleDone(id){ const d=state.done||{}; if(d[id]) DB.rm('done/'+id); else DB.set('done/'+id,true); }
function editLink(id,curN,curQ){
  const n=prompt('표시 이름', curN); if(n===null) return;
  const q=prompt('지도 검색어(장소명/주소)', curQ); if(q===null) return;
  DB.set('links/'+id, {n:n.trim()||curN, q:q.trim()||curQ});
}
function addPur(placeId,name){ name=(name||'').trim(); if(!name)return; DB.push('purchases/'+placeId,{name,price:'',bought:false,payer:'나',method:'카드'}); }
function setPur(placeId,k,field,val){
  if(field==='price') val = val===''?'':Number(val);
  if(field==='bought') val = !!val;
  DB.set('purchases/'+placeId+'/'+k+'/'+field, val);
}
function pickVal(id){ const el=document.querySelector('#'+id+' .pick.on'); return el?el.dataset.v:''; }
function addExpense(){
  const amt=Number($('#exAmt').value); if(!amt){ $('#exAmt').focus(); return; }
  DB.push('expenses',{amt, memo:$('#exMemo').value.trim(), cat:pickVal('exCat'), payer:pickVal('exPayer'), method:pickVal('exMethod')});
  $('#exAmt').value=''; $('#exMemo').value='';
}
function addCustom(){
  const name=$('#cpName').value.trim(); if(!name){ $('#cpName').focus(); return; }
  DB.push('custom/'+DAYS[activeDay].id, {title:name, t:$('#cpTime').value.trim(), cat:pickVal('cpCat'), q:name});
  $('#cpName').value=''; $('#cpTime').value='';
}
function saveRate(){ const r=Number($('#rateInput').value); if(r>0) DB.set('rate',r); }
function convFrom(src){
  const y=$('#convYen'), w=$('#convWon'); const r=rate();
  if(src==='yen'){ w.value = y.value?Math.round(Number(y.value)*r/100):''; }
  else { y.value = w.value?Math.round(Number(w.value)*100/r):''; }
}
// pick groups (event delegation)
document.addEventListener('click',e=>{
  const b=e.target.closest('.pick'); if(!b)return;
  const row=b.parentElement; row.querySelectorAll('.pick').forEach(x=>x.classList.remove('on')); b.classList.add('on');
});

/* ---------- boot ---------- */
DB.sub(d=>{ state=d||{}; 
  if(!state.alerts){ DEFAULT_ALERTS.forEach(a=>DB.push('alerts',a)); } // seed once
  if(state.rate==null){ DB.set('rate',920); }
  render();
});
render();
</script>
</body>
</html>
